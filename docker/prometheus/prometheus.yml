global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - back:5000

  - job_name: frontend
    metrics_path: /metrics
    static_configs:
      - targets:
          - front:3000
