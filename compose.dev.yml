services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.dev
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      TLS_CERT_PATH: /etc/nginx/certs/${TLS_CERT_FILENAME:-selfsigned.crt}
      TLS_KEY_PATH: /etc/nginx/certs/${TLS_KEY_FILENAME:-selfsigned.key}
      CERT_VALID_DAYS: ${CERT_VALID_DAYS:-365}
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      front:
        condition: service_started
      back:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  front:
    build:
      context: ./frontend
      dockerfile: ../docker/front/Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost/api/v1}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - front-node-modules:/app/node_modules
      - front-next-cache:/app/.next
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    build:
      context: ./backend
      dockerfile: ../docker/back/Dockerfile.dev
    environment:
      FLASK_APP: app.py
      FLASK_DEBUG: "1"
      PORT: 5000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  front-node-modules:
  front-next-cache:
