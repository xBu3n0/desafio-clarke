services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarke}
      POSTGRES_USER: ${POSTGRES_USER:-clarke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clarke}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-clarke} -d ${POSTGRES_DB:-clarke}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.dev
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      TLS_CERT_PATH: /etc/nginx/certs/${TLS_CERT_FILENAME:-selfsigned.crt}
      TLS_KEY_PATH: /etc/nginx/certs/${TLS_KEY_FILENAME:-selfsigned.key}
      CERT_VALID_DAYS: ${CERT_VALID_DAYS:-365}
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      front:
        condition: service_started
      back:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  front:
    build:
      context: ./frontend
      dockerfile: ../docker/front/Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost/api/v1}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - front-node-modules:/app/node_modules
      - front-next-cache:/app/.next
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    build:
      context: ./backend
      dockerfile: ../docker/back/Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://clarke:clarke@postgres:5432/clarke}
      FLASK_APP: app.py
      FLASK_DEBUG: "1"
      PORT: 5000
    command:
      [
        "sh",
        "-c",
        "python -m app.infrastructure.migrate && (python -c \"import os,sys; from sqlalchemy import func, select; from app.infrastructure.database import create_engine_from_url, create_session_factory; from app.infrastructure.orm import OfertaModel; engine=create_engine_from_url(os.environ['DATABASE_URL']); session_factory=create_session_factory(engine); session=session_factory(); count=session.scalar(select(func.count()).select_from(OfertaModel)) or 0; session.close(); sys.exit(0 if count > 0 else 1)\" || python -m app.infrastructure.seed) && flask run --host=0.0.0.0 --port=5000 --debug",
      ]
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  front-node-modules:
  front-next-cache:
  postgres-data:
