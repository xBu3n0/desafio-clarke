map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream front_upstream {
  server front:3000;
}

upstream back_upstream {
  server back:5000;
}

upstream minio_api_upstream {
  server minio:9000;
}

upstream minio_console_upstream {
  server minio:9001;
}

upstream prometheus_upstream {
  server prometheus:9090;
}

upstream grafana_upstream {
  server grafana:3000;
}

server {
  listen 80;
  server_name ${SERVER_NAME} localhost web.${SERVER_NAME} api.${SERVER_NAME} minio.${SERVER_NAME} minio-console.${SERVER_NAME} prometheus.${SERVER_NAME} grafana.${SERVER_NAME} web.localhost api.localhost minio.localhost minio-console.localhost prometheus.localhost grafana.localhost;

  if ($host = ${SERVER_NAME}) {
    return 301 https://web.${SERVER_NAME}$request_uri;
  }
  if ($host = localhost) {
    return 301 https://web.localhost$request_uri;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.${SERVER_NAME} api.localhost;

  ssl_certificate ${TLS_CERT_PATH};
  ssl_certificate_key ${TLS_KEY_PATH};
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    proxy_pass http://back_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name ${SERVER_NAME} localhost;

  ssl_certificate ${TLS_CERT_PATH};
  ssl_certificate_key ${TLS_KEY_PATH};
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    if ($host = localhost) {
      return 308 https://web.localhost$request_uri;
    }
    return 308 https://web.${SERVER_NAME}$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name web.${SERVER_NAME} web.localhost;

  ssl_certificate ${TLS_CERT_PATH};
  ssl_certificate_key ${TLS_KEY_PATH};
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /api/ {
    proxy_pass http://back_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://front_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;
  }
}

