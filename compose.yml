services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      TLS_CERT_PATH: /etc/nginx/certs/${TLS_CERT_FILENAME:-selfsigned.crt}
      TLS_KEY_PATH: /etc/nginx/certs/${TLS_KEY_FILENAME:-selfsigned.key}
      CERT_VALID_DAYS: ${CERT_VALID_DAYS:-365}
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      front:
        condition: service_healthy
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  front:
    build:
      context: ./frontend
      dockerfile: ../docker/front/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost/api/v1}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost/api/v1}
      INTERNAL_API_URL: http://back:5000${API_PREFIX:-/api/v1}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    build:
      context: ./backend
      dockerfile: ../docker/back/Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/clarke.db
      PORT: 5000
    expose:
      - "5000"
    volumes:
      - back-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  back-data:
