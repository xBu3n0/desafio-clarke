services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    mem_limit: ${NGINX_MEM_LIMIT:-96m}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      TLS_CERT_PATH: /etc/nginx/certs/${TLS_CERT_FILENAME:-selfsigned.crt}
      TLS_KEY_PATH: /etc/nginx/certs/${TLS_KEY_FILENAME:-selfsigned.key}
      CERT_VALID_DAYS: ${CERT_VALID_DAYS:-365}
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      front:
        condition: service_healthy
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  front:
    build:
      context: ./frontend
      dockerfile: ../docker/front/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://web.localhost/api/v1}
        NEXT_PUBLIC_SERVER_NAME: ${NEXT_PUBLIC_SERVER_NAME:-localhost}
    mem_limit: ${FRONT_MEM_LIMIT:-512m}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://web.localhost/api/v1}
      NEXT_PUBLIC_SERVER_NAME: ${NEXT_PUBLIC_SERVER_NAME:-localhost}
      INTERNAL_API_URL: http://back:5000${API_PREFIX:-/api/v1}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    build:
      context: ./backend
      dockerfile: ../docker/back/Dockerfile
    mem_limit: ${BACK_MEM_LIMIT:-384m}
    environment:
      DATABASE_URL: sqlite:////data/clarke.db
      PORT: 5000
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-public}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://minio.localhost}
    command:
      [
        "sh",
        "-c",
        "python -m app.infrastructure.migrate && (python -c \"import os,sys; from sqlalchemy import func, select; from app.infrastructure.database import create_engine_from_url, create_session_factory; from app.infrastructure.orm import OfertaModel; engine=create_engine_from_url(os.environ['DATABASE_URL']); session_factory=create_session_factory(engine); session=session_factory(); count=session.scalar(select(func.count()).select_from(OfertaModel)) or 0; session.close(); sys.exit(0 if count > 0 else 1)\" || python -m app.infrastructure.seed) && gunicorn --bind 0.0.0.0:5000 wsgi:app",
      ]
    expose:
      - "5000"
    volumes:
      - back-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    mem_limit: ${MINIO_MEM_LIMIT:-256m}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    mem_limit: ${MINIO_INIT_MEM_LIMIT:-64m}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        mc mb --ignore-existing local/"$${MINIO_BUCKET_NAME}";
        mc anonymous set download local/"$${MINIO_BUCKET_NAME}";
        mc cp --recursive /assets/* local/"$${MINIO_BUCKET_NAME}"/;
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-public}
    volumes:
      - ./docker/minio/assets:/assets:ro
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.54.1
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-256m}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    expose:
      - "9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      back:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    mem_limit: ${GRAFANA_MEM_LIMIT:-256m}
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/grafana-16111.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  back-data:
  minio-data:
  prometheus-data:
  grafana-data:
